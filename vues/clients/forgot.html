<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><title>Konekt — Mot de passe oublié</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-hero">
    <div class="logo">KONEKT</div>
    <div><h1>Mot de passe oublié ?</h1><p>Pas de panique — on t'envoie un lien de réinitialisation par email.</p></div>
    <div class="foot">© 2026</div>
  </aside>
  <main class="auth-form">
    <form id="fForm">
      <h2>Réinitialiser</h2><p class="sub">Entre l'email de ton compte.</p>
      <div id="msg"></div>
      <div class="field"><label>Email</label><input type="email" name="email" required></div>
      <button class="btn btn-block" type="submit">Envoyer le lien</button>
      <p class="switch"><a href="login.html">Retour à la connexion</a></p>
    </form>
  </main>
</div>
<script src="../../assets/js/session.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
document.getElementById('fForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  try {
    await api('auth.php?action=forgot', { method:'POST', body:{ email:e.target.email.value }});
    msg.innerHTML = '<div class="alert alert-success">Si un compte existe, un email vient d\'être envoyé. (Vérifie <code>konekt/logs/emails.log</code> en local.)</div>';
  } catch (err) {
    msg.innerHTML = '<div class="alert alert-error">' + esc(err.message) + '</div>';
  }
});
</script>
</body></html>
