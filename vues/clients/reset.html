<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><title>Konekt — Nouveau mot de passe</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-hero">
    <div class="logo">KONEKT</div>
    <div><h1>Nouveau mot de passe</h1><p>Choisis un mot de passe solide.</p></div>
    <div class="foot">© 2026</div>
  </aside>
  <main class="auth-form">
    <form id="rForm">
      <h2>Réinitialisation</h2>
      <div id="msg"></div>
      <div class="field"><label>Nouveau mot de passe (6 car. min.)</label><input type="password" name="password" required minlength="6"></div>
      <button class="btn btn-block" type="submit">Valider</button>
    </form>
  </main>
</div>
<script src="../../assets/js/session.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
document.getElementById('rForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  if (!token) { msg.innerHTML = '<div class="alert alert-error">Lien invalide</div>'; return; }
  try {
    await api('auth.php?action=reset', { method:'POST', body:{ token, password:e.target.password.value }});
    msg.innerHTML = '<div class="alert alert-success">Mot de passe changé. Redirection…</div>';
    setTimeout(() => location.href = 'login.html', 1200);
  } catch (err) {
    msg.innerHTML = '<div class="alert alert-error">' + esc(err.message) + '</div>';
  }
});
</script>
</body></html>
